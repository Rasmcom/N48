name: Apply balanced distribution patch

on:
  push:
    branches:
      - dev/school-setup-import

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev/school-setup-import

      - name: Apply patch
        run: |
          python3 tools/patch_balanced_distribution.py
          node --check app3.js
          node --check tests/ui-smoke.mjs

      - name: Commit result and remove temporary patch files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm tools/patch_balanced_distribution.py .github/workflows/apply-balanced-distribution.yml
          git add app3.js ui-hotfix.css tests/ui-smoke.mjs
          git commit -m "fix: balance teachers across sections and add bulk deletion"
          git push origin HEAD:dev/school-setup-import
