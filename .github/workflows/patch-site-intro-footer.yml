name: Apply website introduction and footer

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update website content
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          style_anchor = '  <link rel="stylesheet" href="import-selection.css" />\n'
          style_link = '  <link rel="stylesheet" href="site-content.css" />\n'
          if style_link not in text:
              if style_anchor not in text:
                  raise SystemExit('stylesheet anchor not found')
              text = text.replace(style_anchor, style_anchor + style_link, 1)

          old_meta = '<meta name="description" content="موزع حصة النشاط وفق نسبة 10% مع حفظ محلي داخل المتصفح" />'
          new_meta = '<meta name="description" content="موقع لتوزيع حصص النشاط للمدارس التي تبلغ حصص موادها 35 حصة أو تبلغ أنصبة جميع معلميها 24 حصة" />'
          text = text.replace(old_meta, new_meta, 1)

          old_hero = '<div class="hero-copy"><span class="hero-kicker">من بيانات المدرسة إلى توزيع عادل</span><h2>اختر المعلمين وإسناداتهم، ودَع النظام يحدد المادة المختصر منها لكل فصل</h2><p>تُقرأ حصص المادة تلقائيًا من الخطة الدراسية، ثم يقارن النظام جميع المعلمين والتخصصات قبل إنشاء توزيع حصة النشاط دون تجاوز نسبة ١٠٪.</p><div class="hero-actions"><button class="primary-button" data-go="settings">ابدأ إعداد المدرسة</button><button class="secondary-button" data-go="import">استيراد المعلمين</button></div></div>'
          new_hero = '<div class="hero-copy"><span class="hero-kicker">تعريف الموقع</span><h2>توزيع حصص النشاط وفق واقع المدرسة وأنصبة المعلمين</h2><p class="hero-eligibility">هذا الموقع مخصص لتوزيع حصص النشاط للمدارس التي يبلغ عدد حصص المواد فيها ٣٥ حصة أسبوعيًا، أو التي تبلغ أنصبة جميع معلميها ٢٤ حصة.</p><p class="hero-description">تُقرأ حصص المواد تلقائيًا من الخطة الدراسية، ثم يقارن النظام جميع المعلمين والتخصصات ويوازن المشاركة بينهم قبل إنشاء التوزيع، دون تجاوز نسبة ١٠٪ من حصص أي مادة.</p><div class="hero-actions"><button class="primary-button" data-go="settings">ابدأ إعداد المدرسة</button><button class="secondary-button" data-go="import">استيراد المعلمين</button></div></div>'
          if old_hero not in text and new_hero not in text:
              raise SystemExit('hero anchor not found')
          text = text.replace(old_hero, new_hero, 1)

          footer = '''      <footer class="site-footer" aria-label="بيانات المبادرة والإعداد">
        <span>مبادرة قسم النشاط بالإدارة العامة للتعليم بمنطقة مكة المكرمة</span>
        <span>إعداد محمد الكناني</span>
      </footer>
'''
          closing_anchor = '      </div>\n    </main>\n  </div>\n'
          if 'class="site-footer"' not in text:
              if closing_anchor not in text:
                  raise SystemExit('main closing anchor not found')
              text = text.replace(closing_anchor, '      </div>\n' + footer + '    </main>\n  </div>\n', 1)

          path.write_text(text, encoding='utf-8')
          PY

          grep -q 'مبادرة قسم النشاط بالإدارة العامة للتعليم بمنطقة مكة المكرمة' index.html
          grep -q 'هذا الموقع مخصص لتوزيع حصص النشاط' index.html
          grep -q 'site-content.css' index.html

      - name: Commit and remove temporary workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/patch-site-intro-footer.yml
          git add index.html
          git commit -m "feat: add activity initiative footer and eligibility introduction"
          git push origin HEAD:main
