name: UI smoke tests

on:
  push:
    branches:
      - dev/school-setup-import
  pull_request:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JavaScript syntax
        id: syntax
        shell: bash
        run: |
          set +e
          node --check app3.js > app3-check.txt 2>&1
          APP3_STATUS=$?
          node --check ui-hotfix.js > hotfix-check.txt 2>&1
          HOTFIX_STATUS=$?
          cat app3-check.txt
          cat hotfix-check.txt
          echo "app3_status=$APP3_STATUS" >> "$GITHUB_OUTPUT"
          echo "hotfix_status=$HOTFIX_STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload syntax diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: syntax-diagnostics
          path: |
            app3-check.txt
            hotfix-check.txt

      - name: Stop on syntax errors
        if: steps.syntax.outputs.app3_status != '0' || steps.syntax.outputs.hotfix_status != '0'
        run: exit 1

      - name: Install Playwright
        run: |
          npm init -y
          npm install --save-dev playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Start local server
        run: |
          python3 -m http.server 4173 > /tmp/n48-server.log 2>&1 &
          echo $! > /tmp/n48-server.pid
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4173 >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/n48-server.log
          exit 1

      - name: Run UI smoke tests
        run: node tests/ui-smoke.mjs
