name: Apply fair teacher participation patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch distribution engine
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('app3.js')
          text = path.read_text(encoding='utf-8')

          old_validation = "else if(Number(t.load)!==Number(state.settings.targetLoad)){status='warning';message=`النصاب ليس ${state.settings.targetLoad}`}"
          new_validation = "else{status='eligible';message=`جاهز للدخول في المقارنة · النصاب المسجل ${t.load}`}"
          if old_validation not in text:
              raise SystemExit('validation target snippet not found')
          text = text.replace(old_validation, new_validation, 1)

          marker = """    const models=allSections().filter(s=>ready.has(s.id)).map(section=>({
      section,
      candidates:semesterSourceGroups(section.id).flatMap(group=>group.assignments.map(a=>({...a,teacher:group.teacher}))),
      weeks:[],blocks:[],currentSourceId:'',currentTeacherId:'',closedSources:new Set()
    }));

    const candidateOptions=(model,usedTeachers)=>{"""

          replacement = """    const models=allSections().filter(s=>ready.has(s.id)).map(section=>({
      section,
      candidates:semesterSourceGroups(section.id).flatMap(group=>group.assignments.map(a=>({...a,teacher:group.teacher}))),
      weeks:[],blocks:[],currentSourceId:'',currentTeacherId:'',closedSources:new Set()
    }));

    /*
     * موازنة المشاركة على مستوى الفصل الدراسي:
     * - كل معلم مكتمل الإسناد وغير مستثنى يدخل في الحصة متى كان لديه رصيد صالح.
     * - توزع الحصص المستهدفة بالتساوي قدر الإمكان، مع مراعاة حد رصيد كل معلم.
     * - النصاب ٢٤ ليس شرطًا؛ النصاب الفعلي المسجل (مثل ١٥ أو ١٨ أو ٢٢) مقبول.
     */
    const teacherById=new Map(state.teachers.map(t=>[t.id,t]));
    const teacherCapacity=new Map();
    models.forEach(model=>model.candidates.forEach(candidate=>{
      teacherCapacity.set(candidate.teacherId,(teacherCapacity.get(candidate.teacherId)||0)+Number(candidate.capacity||0))
    }));
    const teacherIds=[...teacherCapacity.keys()];
    const teacherTargetShare=new Map(teacherIds.map(id=>[id,0]));
    const effectiveCapacity=id=>Math.min(length,Number(teacherCapacity.get(id)||0));
    let remainingFairSlots=models.length*length;
    while(remainingFairSlots>0){
      const available=teacherIds.filter(id=>(teacherTargetShare.get(id)||0)<effectiveCapacity(id));
      if(!available.length)break;
      available.sort((a,b)=>{
        const shareDiff=(teacherTargetShare.get(a)||0)-(teacherTargetShare.get(b)||0);
        if(shareDiff)return shareDiff;
        const loadDiff=Number(teacherById.get(b)?.load||0)-Number(teacherById.get(a)?.load||0);
        if(loadDiff)return loadDiff;
        return String(teacherById.get(a)?.name||'').localeCompare(String(teacherById.get(b)?.name||''),'ar')
      });
      for(const id of available){
        if(remainingFairSlots<=0)break;
        if((teacherTargetShare.get(id)||0)<effectiveCapacity(id)){
          teacherTargetShare.set(id,(teacherTargetShare.get(id)||0)+1);
          remainingFairSlots-=1
        }
      }
    }

    const candidateOptions=(model,usedTeachers)=>{"""

          if marker not in text:
              raise SystemExit('distribution models marker not found')
          text = text.replace(marker, replacement, 1)

          old_score = """        const load=Number(candidate.teacher.load||state.settings.targetLoad||24);
        const lowLoadAdvantage=Math.max(0,Number(state.settings.targetLoad||24)-load);
        const sectionSet=teacherSectionUse.get(candidate.teacherId)||new Set();
        const score=sameSource*1000000+sameTeacher*180000+Number(candidate.weeklyPeriods)*5000+(specialtyMatch(candidate.specialty,candidate.subject)?1200:0)+candidate.remaining*90+lowLoadAdvantage*150-(teacherActivityCount.get(candidate.teacherId)||0)*35-sectionSet.size*260-(semester===2?repeatedPair*50000+repeatedTeacher*12000:0);"""

          new_score = """        const load=Number(candidate.teacher.load||state.settings.targetLoad||24);
        const lowLoadAdvantage=Math.max(0,Number(state.settings.targetLoad||24)-load);
        const sectionSet=teacherSectionUse.get(candidate.teacherId)||new Set();
        const usedCount=teacherActivityCount.get(candidate.teacherId)||0;
        const fairTarget=teacherTargetShare.get(candidate.teacherId)||0;
        const fairDeficit=Math.max(0,fairTarget-usedCount);
        const fairnessBonus=fairDeficit>0?2000000+fairDeficit*2000:0;
        const score=fairnessBonus+sameSource*700000+sameTeacher*140000+Number(candidate.weeklyPeriods)*5000+(specialtyMatch(candidate.specialty,candidate.subject)?1200:0)+candidate.remaining*90+lowLoadAdvantage*300-usedCount*900-sectionSet.size*260-(semester===2?repeatedPair*50000+repeatedTeacher*12000:0);"""

          if old_score not in text:
              raise SystemExit('distribution score snippet not found')
          text = text.replace(old_score, new_score, 1)

          path.write_text(text, encoding='utf-8')
          PY
          node --check app3.js

      - name: Commit patch and remove temporary workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/patch-fair-teacher-participation.yml
          git add app3.js
          git commit -m "fix: balance activity distribution across all eligible teachers"
          git push origin HEAD:main
