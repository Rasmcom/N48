name: Restore app3 baseline

on:
  push:
    branches:
      - dev/school-setup-import

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout development branch
        uses: actions/checkout@v4
        with:
          ref: dev/school-setup-import
          fetch-depth: 0

      - name: Restore application file when placeholder is present
        shell: bash
        run: |
          if grep -qx 'PLACEHOLDER' app3.js; then
            git show 476ec0890bc9043ca3bfffadf68d4e789b71a017:app3.js > app3.js
          fi
          node --check app3.js

      - name: Commit restoration
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'No restoration required'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app3.js
          git commit -m 'fix: restore application runtime before next update'
          git push origin HEAD:dev/school-setup-import
