name: Repair application runtime

on:
  push:
    branches:
      - dev/school-setup-import

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout development branch
        uses: actions/checkout@v4
        with:
          ref: dev/school-setup-import

      - name: Apply guarded runtime repairs
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('app3.js')
          text = path.read_text(encoding='utf-8')

          bad_steps = "const steps=[['إعداد المدرسة','الهوية والمراحل والشعب',flags[0]],['استيراد المعلمين','الأسماء والتخصصات والأنصبة',flags[1]],['إسناد المواد والفصول','الحصص تُقرأ تلقائيًا من الدليل',flags[2]],['التحقق','فحص النصاب ورصيد كل فصل',flags[3]],['التوزيع','اختيار المادة المختصر منها لكل فصل',flags[4]];"
          good_steps = "const steps=[['إعداد المدرسة','الهوية والمراحل والشعب',flags[0]],['استيراد المعلمين','الأسماء والتخصصات والأنصبة',flags[1]],['إسناد المواد والفصول','الحصص تُقرأ تلقائيًا من الدليل',flags[2]],['التحقق','فحص النصاب ورصيد كل فصل',flags[3]],['التوزيع','اختيار المادة المختصر منها لكل فصل',flags[4]]];"
          text = text.replace(bad_steps, good_steps)

          old_input_handler = "$('#importPreview').addEventListener('input',e=>{const i=e.target.closest('[data-preview-field]');if(!i)return;const x=state.importPreview.find(v=>v.tempId===i.dataset.previewId);if(!x)return;x[i.dataset.previewField]=i.dataset.previewField==='load'?(i.value?Number(i.value):null):i.value;x.status=!x.name?'error':!x.specialty||!Number(x.load)?'warning':'complete';renderImportPreview();scheduleSave()});"
          new_input_handler = "$('#importPreview').addEventListener('input',e=>{const i=e.target.closest('[data-preview-field]');if(!i)return;const x=state.importPreview.find(v=>v.tempId===i.dataset.previewId);if(!x)return;x[i.dataset.previewField]=i.dataset.previewField==='load'?(i.value?Number(i.value):null):i.value;x.status=!x.name?'error':!x.specialty||!Number(x.load)?'warning':'complete';$('#commitImportBtn').disabled=!state.importPreview.length||state.importPreview.some(v=>!v.name||!v.specialty||!Number(v.load));const row=i.closest('tr');if(row&&row.lastElementChild)row.lastElementChild.innerHTML=previewChip(x);updatePreviewQuality();scheduleSave()});"
          text = text.replace(old_input_handler, new_input_handler)

          path.write_text(text, encoding='utf-8')
          PY
          node --check app3.js
          node --check ui-hotfix.js

      - name: Commit repair when needed
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No repair required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app3.js
          git commit -m "fix: keep import fields interactive and enable approval"
          git push origin HEAD:dev/school-setup-import
